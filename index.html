<script>
// ========== LOGIN SYSTEM ==========
const USERS = {
  'admin': { password: 'ppn123', name: 'Arief Ganteng', role: 'Super Admin' },
  'user': { password: 'user123', name: 'HSE Officer', role: 'Officer' }
};

function login(event) {
  event.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const loginBtn = document.getElementById('loginBtn');
  const errorLogin = document.getElementById('errorLogin');
  
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memverifikasi...';
  
  setTimeout(() => {
    if (USERS[username] && USERS[username].password === password) {
      localStorage.setItem('loggedIn', 'true');
      localStorage.setItem('username', username);
      localStorage.setItem('userName', USERS[username].name);
      document.getElementById('userName').textContent = USERS[username].name;
      document.getElementById('loginModal').style.display = 'none';
      document.getElementById('sidebar').style.display = 'block';
      document.getElementById('mainContent').style.display = 'block';
      
      // Trigger existing script initialization
      if (typeof initDashboard === 'function') initDashboard();
      else console.log('Dashboard initialized');
    } else {
      errorLogin.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Masuk ke Dashboard';
    }
  }, 1500);
}

function logout() {
  localStorage.clear();
  document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('errorLogin').style.display = 'none';
}

// Check if already logged in
if (localStorage.getItem('loggedIn') === 'true') {
  document.getElementById('loginModal').style.display = 'none';
  document.getElementById('sidebar').style.display = 'block';
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('userName').textContent = localStorage.getItem('userName');
}

// ========== DOWNLOAD FUNCTIONS ==========
function downloadExcel(type) {
  // Simulate data download
  const data = type === 'hra' ? 
    [{Kapal: 'MV Sample', Fleet: 'FP I', Bulan: 'Mei', Vendor: 'ABC', Status: 'Done', Budget: 'Rp 5.000.000'}] :
    [{Kapal: 'MV Sample', Fleet: 'FP I', Tanggal: '2024-05-15', Crew: '25', Hasil: 'Negatif', Positif: '0', TindakLanjut: 'None'}];
  
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, type.toUpperCase());
  XLSX.writeFile(wb, `Health_PPN_III_${type.toUpperCase()}_2026.xlsx`);
}

function downloadPDF() {
  window.print(); // Simple PDF via browser print
  // You can integrate jsPDF for better PDF generation
}

function downloadAll() {
  downloadExcel('hra');
  setTimeout(() => downloadExcel('dat'), 1000);
  setTimeout(() => downloadPDF(), 2000);
}

// Prevent F12, Right Click, Ctrl+U, etc.
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || 
      (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.key === 's')) {
    e.preventDefault();
  }
});
</script>
