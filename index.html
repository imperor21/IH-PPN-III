<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HSE Marine Dashboard</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/4.4.1/chart.umd.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:#fff}

/* LOGIN */
.login-page {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#0f172a;
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
}
.login-box {
  background:#fff;color:#000;padding:30px;border-radius:12px;width:280px;text-align:center;
}
.login-box input {
  width:100%;margin:8px 0;padding:10px;border-radius:8px;border:1px solid #ccc;
}
.login-box button {
  width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;
  cursor:pointer;
}

/* DASHBOARD */
.sidebar {
  width:220px;background:#1e293b;height:100vh;position:fixed;padding:15px;
}
.main {
  margin-left:220px;padding:20px;
}
.topbar {
  display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
}
.kpi {
  display:flex;gap:10px;
}
.card {
  background:#1e293b;padding:15px;border-radius:10px;flex:1;
}
button {
  cursor:pointer;padding:8px 12px;border:none;border-radius:6px;
}
.btn {
  background:#2563eb;color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h2>Login HSE</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginError" style="color:red;display:none">Salah!</p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>HSE Marine</h3>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">

  <div class="topbar">
    <h2>Dashboard</h2>
    <div>
      <button class="btn" onclick="downloadPDF()">
        <i class="fa fa-file-pdf"></i> PDF
      </button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi">
    <div class="card">
      <h3 id="kpi1">85</h3>
      <p>Total Kapal</p>
    </div>
    <div class="card">
      <h3 id="kpi2">60</h3>
      <p>Monitoring</p>
    </div>
    <div class="card">
      <h3 id="kpi3">25</h3>
      <p>Belum</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="card" style="margin-top:20px">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
/* ================= LOGIN ================= */
const USER = "admin";
const PASS = "12345";

function login() {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
    localStorage.setItem("login", "true");
    document.getElementById("loginPage").style.display = "none";
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

window.onload = function () {
  if (localStorage.getItem("login") === "true") {
    document.getElementById("loginPage").style.display = "none";
  }
};

/* ================= CHART ================= */
new Chart(document.getElementById("chart"), {
  type: 'bar',
  data: {
    labels: ['Mei','Juni','Juli'],
    datasets: [{
      label: 'Monitoring',
      data: [10,20,30]
    }]
  }
});

/* ================= PDF ================= */
async function downloadPDF() {
  const { jsPDF } = window.jspdf;

  const sidebar = document.querySelector(".sidebar");
  sidebar.style.display = "none";

  const element = document.getElementById("mainContent");

  const canvas = await html2canvas(element, { scale: 2 });
  const imgData = canvas.toDataURL("image/png");

  const pdf = new jsPDF("l","mm","a4");

  const width = pdf.internal.pageSize.getWidth();
  const height = (canvas.height * width) / canvas.width;

  pdf.addImage(imgData, "PNG", 0, 0, width, height);
  pdf.save("dashboard.pdf");

  sidebar.style.display = "block";
}
</script>

</body>
</html>
